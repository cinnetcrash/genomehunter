<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="GenomeHunter — çocuklar için Pokémon tarzı arcade biyoinformatik macera oyunu. Genom-mon'ları yakala, DNA'dan genoma 1000 seviye!" />
  <meta name="theme-color" content="#0a1226" />
  <title>GenomeHunter — Genom Bölgesi Macerası</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🧬</text></svg>" />
  <link rel="stylesheet" href="css/arcade.css" />
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="480" height="270"></canvas>

    <!-- on-screen touch controls (mobile) -->
    <div id="touch">
      <div id="dpad">
        <button class="tb" data-k="up">▲</button>
        <div class="trow">
          <button class="tb" data-k="left">◀</button>
          <button class="tb" data-k="down">▼</button>
          <button class="tb" data-k="right">▶</button>
        </div>
      </div>
      <div id="acts">
        <button class="tb tb-a" data-k="confirm">Z</button>
        <button class="tb tb-b" data-k="back">X</button>
      </div>
    </div>

    <!-- name entry overlay -->
    <div id="nameOverlay">
      <div id="nameBox">
        <label id="nameLabel">Adını gir:</label>
        <input id="nameInput" maxlength="10" autocomplete="off" />
        <button id="nameBtn">Kaydet</button>
      </div>
    </div>
  </div>

  <noscript>Bu oyun için JavaScript gereklidir. / This game requires JavaScript.</noscript>

  <script src="js/i18n.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/arcade/sprites.js"></script>
  <script src="js/arcade/ui.js"></script>
  <script src="js/arcade/core.js"></script>
  <script src="js/arcade/challenges.js"></script>
  <script src="js/arcade/battle.js"></script>
  <script src="js/arcade/route.js"></script>
  <script src="js/arcade/scoreboard.js"></script>
  <script src="js/arcade/main.js"></script>
  <script>
    // Wire on-screen touch buttons to GH.A.touch state.
    (function () {
      var t = GH.A.touch;
      document.querySelectorAll(".tb").forEach(function (b) {
        var k = b.dataset.k;
        function on(e) { e.preventDefault(); t[k] = true; }
        function off(e) { e.preventDefault(); t[k] = false; }
        b.addEventListener("touchstart", on, { passive: false });
        b.addEventListener("touchend", off);
        b.addEventListener("mousedown", on);
        b.addEventListener("mouseup", off);
        b.addEventListener("mouseleave", off);
      });
      // show touch controls only on touch devices
      if (!("ontouchstart" in window)) document.getElementById("touch").style.display = "none";
    })();
    GH.A.boot();
  </script>
</body>
</html>
